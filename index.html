<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Polígono con Bresenham</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        canvas {
            border: 2px solid #333;
            background-color: white;
            margin-top: 20px;
            cursor: crosshair;
        }

        .info {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        button {
            margin-top: 15px;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Polígono Regular + Circunferencias</h1>

    <canvas id="canvas" width="500" height="500"></canvas>

    <div class="info">
        Se genera automáticamente un polígono de 5 a 10 lados usando Bresenham.
    </div>

    <button onclick="generarFigura()">Generar otra figura</button>

    <!-- IMPORTANTE: conectar el JS -->
    <script src="script.js"></script>

</body>
</html>
